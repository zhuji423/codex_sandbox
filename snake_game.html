<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇 Snake</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --snake: #22c55e;
      --food: #ef4444;
      --grid: rgba(148, 163, 184, 0.15);
      --btn: #1f2937;
      --btn-hover: #374151;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
      padding: 16px;
    }

    .app {
      width: min(96vw, 560px);
      background: color-mix(in oklab, var(--panel) 92%, black 8%);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0.3px;
    }

    .stats {
      display: flex;
      gap: 8px;
      font-size: 0.92rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .badge {
      background: #0b1220;
      border: 1px solid #273449;
      padding: 4px 8px;
      border-radius: 999px;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1/1;
      display: block;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 12px;
    }

    .controls {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid #334155;
      border-radius: 10px;
      background: var(--btn);
      color: var(--text);
      padding: 8px 12px;
      font-size: 0.92rem;
      cursor: pointer;
    }

    button:hover { background: var(--btn-hover); }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1 class="title">🐍 贪吃蛇（可离线运行）</h1>
      <div class="stats">
        <span class="badge">得分: <strong id="score">0</strong></span>
        <span class="badge">最高分: <strong id="best">0</strong></span>
        <span class="badge">速度: <strong id="speed">8</strong> 格/秒</span>
      </div>
    </section>

    <canvas id="game" width="500" height="500" aria-label="snake game"></canvas>

    <section class="controls">
      <button id="startBtn">开始 / 重新开始</button>
      <button id="pauseBtn">暂停 / 继续 (空格)</button>
      <button id="speedBtn">切换速度</button>
    </section>

    <p class="hint">
      控制方式：方向键 或 WASD。<br/>
      规则：撞墙或撞到自己会结束，按「开始/重新开始」立即再来一局。
    </p>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const speedEl = document.getElementById('speed');

    const GRID = 20;
    const TILE = canvas.width / GRID;
    const SPEEDS = [8, 12, 16];

    let speedIndex = 0;
    let snake = [];
    let dir = { x: 1, y: 0 };
    let nextDir = { x: 1, y: 0 };
    let food = { x: 10, y: 10 };
    let running = false;
    let paused = false;
    let score = 0;
    let timer = null;

    const bestKey = 'snake_best_score_v1';
    const getBest = () => Number(localStorage.getItem(bestKey) || 0);
    const setBest = (v) => localStorage.setItem(bestKey, String(v));

    function randCell() {
      return { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
    }

    function placeFood() {
      let p = randCell();
      while (snake.some(s => s.x === p.x && s.y === p.y)) {
        p = randCell();
      }
      food = p;
    }

    function reset() {
      snake = [
        { x: 8, y: 10 },
        { x: 7, y: 10 },
        { x: 6, y: 10 }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      paused = false;
      placeFood();
      updateStats();
      draw();
    }

    function updateStats() {
      scoreEl.textContent = score;
      bestEl.textContent = getBest();
      speedEl.textContent = SPEEDS[speedIndex];
    }

    function gameOver() {
      running = false;
      clearInterval(timer);
      const best = getBest();
      if (score > best) setBest(score);
      updateStats();
      drawMessage(`游戏结束！本局 ${score} 分`);
    }

    function step() {
      if (!running || paused) return;

      dir = nextDir;
      const head = snake[0];
      const newHead = { x: head.x + dir.x, y: head.y + dir.y };

      if (newHead.x < 0 || newHead.x >= GRID || newHead.y < 0 || newHead.y >= GRID) {
        gameOver();
        return;
      }

      if (snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
        gameOver();
        return;
      }

      snake.unshift(newHead);

      if (newHead.x === food.x && newHead.y === food.y) {
        score += 1;
        if (score > getBest()) setBest(score);
        placeFood();
      } else {
        snake.pop();
      }

      updateStats();
      draw();
    }

    function drawGrid() {
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--grid').trim();
      ctx.lineWidth = 1;
      for (let i = 1; i < GRID; i++) {
        const p = i * TILE;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc((food.x + 0.5) * TILE, (food.y + 0.5) * TILE, TILE * 0.36, 0, Math.PI * 2);
      ctx.fill();

      snake.forEach((seg, idx) => {
        ctx.fillStyle = idx === 0 ? '#22c55e' : '#16a34a';
        const pad = idx === 0 ? 2 : 3;
        ctx.fillRect(seg.x * TILE + pad, seg.y * TILE + pad, TILE - pad * 2, TILE - pad * 2);
      });

      if (paused && running) {
        drawMessage('已暂停');
      }
    }

    function drawMessage(text) {
      ctx.fillStyle = 'rgba(2, 6, 23, 0.7)';
      ctx.fillRect(0, canvas.height / 2 - 32, canvas.width, 64);
      ctx.fillStyle = '#f8fafc';
      ctx.font = 'bold 24px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);
    }

    function start() {
      clearInterval(timer);
      running = true;
      paused = false;
      reset();
      timer = setInterval(step, 1000 / SPEEDS[speedIndex]);
    }

    function togglePause() {
      if (!running) return;
      paused = !paused;
      draw();
    }

    function changeSpeed() {
      speedIndex = (speedIndex + 1) % SPEEDS.length;
      updateStats();
      if (running) {
        clearInterval(timer);
        timer = setInterval(step, 1000 / SPEEDS[speedIndex]);
      }
    }

    function setDirection(x, y) {
      if (!running) return;
      if (x === -dir.x && y === -dir.y) return;
      nextDir = { x, y };
    }

    document.getElementById('startBtn').addEventListener('click', start);
    document.getElementById('pauseBtn').addEventListener('click', togglePause);
    document.getElementById('speedBtn').addEventListener('click', changeSpeed);

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " ", "w", "a", "s", "d"].includes(key)) {
        e.preventDefault();
      }
      if (key === 'arrowup' || key === 'w') setDirection(0, -1);
      else if (key === 'arrowdown' || key === 's') setDirection(0, 1);
      else if (key === 'arrowleft' || key === 'a') setDirection(-1, 0);
      else if (key === 'arrowright' || key === 'd') setDirection(1, 0);
      else if (key === ' ') togglePause();
    });

    reset();
    drawMessage('点击“开始”开始游戏');
  </script>
</body>
</html>
